services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    volumes:
      - .:/app
      - cargo-cache:/root/.cargo/registry
      - target-cache:/app/target
    environment:
      - RUST_BACKTRACE=1
    command: bash scripts/ci/run-networkmanager-tests.sh all

  test-all:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    volumes:
      - .:/app
      - cargo-cache:/root/.cargo/registry
      - target-cache:/app/target
    environment:
      - RUST_BACKTRACE=1
    command: bash scripts/ci/run-networkmanager-tests.sh all

  test-integration:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    volumes:
      - .:/app
      - cargo-cache:/root/.cargo/registry
      - target-cache:/app/target
    environment:
      - RUST_BACKTRACE=1
    command: bash scripts/ci/run-networkmanager-tests.sh integration

  shell:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    volumes:
      - .:/app
      - cargo-cache:/root/.cargo/registry
      - target-cache:/app/target
    environment:
      - RUST_BACKTRACE=1
    command: bash scripts/ci/run-networkmanager-tests.sh shell
    stdin_open: true
    tty: true

volumes:
  cargo-cache:
  target-cache:
